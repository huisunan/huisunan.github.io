<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="keyword">package</span> com.ccsa.common.core.util;</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> lombok.experimental.UtilityClass;</span><br><span class="line"><span class="keyword">import</span> org.springframework.lang.Nullable;</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> java.util.LinkedHashMap;</span><br><span class="line"><span class="keyword">import</span> java.util.List;</span><br><span class="line"><span class="keyword">import</span> java.util.Map;</span><br><span class="line"><span class="keyword">import</span> java.util.function.Function;</span><br><span class="line"><span class="keyword">import</span> java.util.stream.Collectors;</span><br><span class="line"></span><br><span class="line"><span class="meta">@UtilityClass</span></span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">TreeUtil</span> &#123;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> &lt;T, I, V&gt; List&lt;V&gt; <span class="title function_">treeList</span><span class="params">(List&lt;T&gt; originalList, I rootId, Function&lt;T, I&gt; getId, Function&lt;T, I&gt; getPid,</span></span><br><span class="line"><span class="params">                                      Function&lt;V, List&lt;V&gt;&gt; getChildrenList, Function&lt;T, V&gt; handleV)</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> treeList(originalList, rootId, getId, getPid, getChildrenList, handleV, <span class="literal">null</span>);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> &lt;T, I, V&gt; List&lt;V&gt; <span class="title function_">treeList</span><span class="params">(List&lt;T&gt; originalList, I rootId, Function&lt;T, I&gt; getId, Function&lt;T, I&gt; getPid,</span></span><br><span class="line"><span class="params">                                      Function&lt;V, List&lt;V&gt;&gt; getChildrenList, Function&lt;T, V&gt; handleV, <span class="meta">@Nullable</span> OtherHandle&lt;T, I, V&gt; otherHandle)</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> tree(originalList, rootId, getId, getPid, getChildrenList, handleV, otherHandle).entrySet().stream()</span><br><span class="line">                .filter(i -&gt; rootId.equals(i.getKey())).map(Map.Entry::getValue).collect(Collectors.toList());</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> &lt;T, I, V&gt; Map&lt;I, V&gt; <span class="title function_">tree</span><span class="params">(List&lt;T&gt; originalList, I rootId, Function&lt;T, I&gt; getId, Function&lt;T, I&gt; getPid,</span></span><br><span class="line"><span class="params">                                    Function&lt;V, List&lt;V&gt;&gt; getChildrenList, Function&lt;T, V&gt; handleV)</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> tree(originalList, rootId, getId, getPid, getChildrenList, handleV, <span class="literal">null</span>);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * treeUtil</span></span><br><span class="line"><span class="comment">     *</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> originalList    原始列表</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> rootId          根结点</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> getId           获取id</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> getPid          获取pid</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> getChildrenList 获取子节点的list</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> handleV         处理Vo,这里要初始化好 childrenList</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> otherHandle     其他处理</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> &lt;T&gt;             入参</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> &lt;I&gt;             id类型</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> &lt;V&gt;             出参</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@return</span> 结果树</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> &lt;T, I, V&gt; Map&lt;I, V&gt; <span class="title function_">tree</span><span class="params">(List&lt;T&gt; originalList, I rootId, Function&lt;T, I&gt; getId, Function&lt;T, I&gt; getPid,</span></span><br><span class="line"><span class="params">                                    Function&lt;V, List&lt;V&gt;&gt; getChildrenList, Function&lt;T, V&gt; handleV,</span></span><br><span class="line"><span class="params">                                    <span class="meta">@Nullable</span> OtherHandle&lt;T, I, V&gt; otherHandle)</span> &#123;</span><br><span class="line">        <span class="comment">//构建map</span></span><br><span class="line">        Map&lt;I, V&gt; resultMap = <span class="keyword">new</span> <span class="title class_">LinkedHashMap</span>&lt;&gt;();</span><br><span class="line">        Map&lt;I, T&gt; map = originalList.stream().collect(Collectors.toMap(getId, Function.identity()));</span><br><span class="line">        <span class="comment">//</span></span><br><span class="line">        <span class="keyword">for</span> (T t : originalList) &#123;</span><br><span class="line">            <span class="type">I</span> <span class="variable">pid</span> <span class="operator">=</span> getPid.apply(t);</span><br><span class="line">            <span class="type">I</span> <span class="variable">id</span> <span class="operator">=</span> getId.apply(t);</span><br><span class="line">            <span class="type">V</span> <span class="variable">v</span> <span class="operator">=</span> resultMap.get(id);</span><br><span class="line">            <span class="keyword">if</span> (v == <span class="literal">null</span>)&#123;</span><br><span class="line">               v = handleV.apply(t);</span><br><span class="line">            &#125;</span><br><span class="line"></span><br><span class="line">            <span class="keyword">if</span> (pid == rootId) &#123;</span><br><span class="line">                <span class="comment">//判断顶层是否存在,不存在则创建，处理没有子项的顶层</span></span><br><span class="line">                <span class="keyword">if</span> (!resultMap.containsKey(id)) &#123;</span><br><span class="line">                    resultMap.put(id, v);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">continue</span>;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">//获取父类,将自己添加到父类</span></span><br><span class="line">            <span class="type">V</span> <span class="variable">parentV</span> <span class="operator">=</span> resultMap.computeIfAbsent(pid, key -&gt; handleV.apply(map.get(key)));</span><br><span class="line">            <span class="comment">//将自己加入结果map</span></span><br><span class="line">            resultMap.putIfAbsent(id, v);</span><br><span class="line">            <span class="comment">//父节点的子节点列表</span></span><br><span class="line">            List&lt;V&gt; parentChildrenList = getChildrenList.apply(parentV);</span><br><span class="line">            parentChildrenList.add(v);</span><br><span class="line">            <span class="keyword">if</span> (otherHandle != <span class="literal">null</span>) &#123;</span><br><span class="line">                otherHandle.accept(v, parentV, t, map, resultMap);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> resultMap;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">interface</span> <span class="title class_">OtherHandle</span>&lt;T, I, V&gt; &#123;</span><br><span class="line">        <span class="comment">/**</span></span><br><span class="line"><span class="comment">         * 其他处理</span></span><br><span class="line"><span class="comment">         *</span></span><br><span class="line"><span class="comment">         * <span class="doctag">@param</span> vo        vo</span></span><br><span class="line"><span class="comment">         * <span class="doctag">@param</span> parentVo  父vo</span></span><br><span class="line"><span class="comment">         * <span class="doctag">@param</span> t         原始参数</span></span><br><span class="line"><span class="comment">         * <span class="doctag">@param</span> cacheMap  原始缓存</span></span><br><span class="line"><span class="comment">         * <span class="doctag">@param</span> resultMap 结果集缓存</span></span><br><span class="line"><span class="comment">         */</span></span><br><span class="line">        <span class="keyword">void</span> <span class="title function_">accept</span><span class="params">(V vo, V parentVo, T t, Map&lt;I, T&gt; cacheMap, Map&lt;I, V&gt; resultMap)</span>;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure></div>
