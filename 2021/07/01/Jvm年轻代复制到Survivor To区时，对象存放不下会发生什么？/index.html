<p>如果To区放不下会直接晋升到老年代</p>
<figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br></pre></td><td class="code"><pre><span class="line"><span class="function">oop <span class="title">DefNewGeneration::copy_to_survivor_space</span><span class="params">(oop old)</span> </span>&#123;</span><br><span class="line">  <span class="built_in">assert</span>(<span class="built_in">is_in_reserved</span>(old) &amp;&amp; !old-&gt;<span class="built_in">is_forwarded</span>(),</span><br><span class="line">         <span class="string">&quot;shouldn&#x27;t be scavenging this oop&quot;</span>);</span><br><span class="line">  <span class="type">size_t</span> s = old-&gt;<span class="built_in">size</span>();</span><br><span class="line">  oop obj = <span class="literal">NULL</span>;</span><br><span class="line"> </span><br><span class="line">  <span class="comment">// Try allocating obj in to-space (unless too old)</span></span><br><span class="line">  <span class="keyword">if</span> (old-&gt;<span class="built_in">age</span>() &lt; <span class="built_in">tenuring_threshold</span>()) &#123;</span><br><span class="line">    <span class="comment">//如果对象的年龄低于tenuring_threshold，则该在to区申请一块同样大小的内存</span></span><br><span class="line">    obj = (oop) <span class="built_in">to</span>()-&gt;<span class="built_in">allocate_aligned</span>(s);</span><br><span class="line">  &#125;</span><br><span class="line"> </span><br><span class="line">  <span class="comment">// Otherwise try allocating obj tenured</span></span><br><span class="line">  <span class="keyword">if</span> (obj == <span class="literal">NULL</span>) &#123;</span><br><span class="line">    <span class="comment">//如果如果对象的年龄大于tenuring_threshold或者to区申请内存失败</span></span><br><span class="line">    <span class="comment">//则尝试将该对象复制到老年代</span></span><br><span class="line">    obj = _next_gen-&gt;<span class="built_in">promote</span>(old, s);</span><br><span class="line">    <span class="keyword">if</span> (obj == <span class="literal">NULL</span>) &#123;</span><br><span class="line">      <span class="comment">//复制失败</span></span><br><span class="line">      <span class="built_in">handle_promotion_failure</span>(old);</span><br><span class="line">      <span class="keyword">return</span> old;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">    <span class="comment">//to区中申请内存成功</span></span><br><span class="line">    <span class="type">const</span> intx interval = PrefetchCopyIntervalInBytes;</span><br><span class="line">    Prefetch::<span class="built_in">write</span>(obj, interval);</span><br><span class="line"> </span><br><span class="line">    <span class="comment">//对象复制</span></span><br><span class="line">    Copy::<span class="built_in">aligned_disjoint_words</span>((HeapWord*)old, (HeapWord*)obj, s);</span><br><span class="line"> </span><br><span class="line">    <span class="comment">//增加年龄，并修改age_table，增加对应年龄的总对象大小</span></span><br><span class="line">    <span class="comment">//注意此处是增加复制对象而非原来对象的分代年龄</span></span><br><span class="line">    obj-&gt;<span class="built_in">incr_age</span>();</span><br><span class="line">    <span class="built_in">age_table</span>()-&gt;<span class="built_in">add</span>(obj, s);</span><br><span class="line">  &#125;</span><br><span class="line"> </span><br><span class="line">  <span class="comment">//将对象头指针指向新地址</span></span><br><span class="line">  old-&gt;forward_to(obj);</span><br><span class="line"> </span><br><span class="line">  <span class="keyword">return</span> obj;</span><br><span class="line">&#125;</span><br><span class="line"> </span><br></pre></td></tr></table></figure></div>
