lass="line"> if [ $? -eq &quot;0&quot; ]; then</span><br><span class="line"> echo &quot;$&#123;APP_NAME&#125; is already running. pid=$&#123;pid&#125; .&quot;</span><br><span class="line"> else</span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash">此处注意修改jar和<span class="built_in">log</span>文件文件位置：</span></span><br><span class="line">source /etc/profile</span><br><span class="line"> nohup java -jar $&#123;APP_NAME&#125; &gt;&gt; $&#123;LOG_NAME&#125;   2&gt;&amp;1 &amp;</span><br><span class="line"> fi</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash">停止脚本</span></span><br><span class="line">stop()&#123;</span><br><span class="line"> is_exist</span><br><span class="line"> if [ $? -eq &quot;0&quot; ]; then</span><br><span class="line"> kill -9 $pid</span><br><span class="line"> else</span><br><span class="line"> echo &quot;$&#123;APP_NAME&#125; is not running&quot;</span><br><span class="line"> fi</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash">显示当前jar运行状态</span></span><br><span class="line">status()&#123;</span><br><span class="line"> is_exist</span><br><span class="line"> if [ $? -eq &quot;0&quot; ]; then</span><br><span class="line"> echo &quot;$&#123;APP_NAME&#125; is running. Pid is $&#123;pid&#125;&quot;</span><br><span class="line"> else</span><br><span class="line"> echo &quot;$&#123;APP_NAME&#125; is NOT running.&quot;</span><br><span class="line"> fi</span><br><span class="line">&#125;</span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash">重启脚本</span></span><br><span class="line">restart()&#123;</span><br><span class="line"> stop</span><br><span class="line"> start</span><br><span class="line"> echo &quot;$&#123;APP_NAME&#125; restart&quot;</span><br><span class="line">return 0</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">case &quot;$1&quot; in</span><br><span class="line"> &quot;start&quot;)</span><br><span class="line"> start</span><br><span class="line"> ;;</span><br><span class="line"> &quot;stop&quot;)</span><br><span class="line"> stop</span><br><span class="line"> ;;</span><br><span class="line"> &quot;status&quot;)</span><br><span class="line"> status</span><br><span class="line"> ;;</span><br><span class="line"> &quot;restart&quot;)</span><br><span class="line"> restart</span><br><span class="line"> ;;</span><br><span class="line"> *)</span><br><span class="line"> usage</span><br><span class="line"> ;;</span><br><span class="line">esac</span><br><span class="line"></span><br></pre></td></tr></table></figure></div>
